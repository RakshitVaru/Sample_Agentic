<script>
function showStatus(message) {
    const status = document.getElementById('status');
    status.textContent = message;
    status.style.display = 'block';
    setTimeout(() => status.style.display = 'none', 3000);
}

function downloadPNG() {
    const svg = document.getElementById('architecture');
    const canvas = document.createElement('canvas');
    const scale = 2; // Higher resolution
    canvas.width = 680 * scale;
    canvas.height = 1100 * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    
    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    
    const img = new Image();
    img.onload = function() {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        
        canvas.toBlob(function(blob) {
            const link = document.createElement('a');
            link.download = 'rbc-cte-validation-architecture.png';
            link.href = URL.createObjectURL(blob);
            link.click();
            showStatus('✓ PNG downloaded successfully!');
        });
    };
    img.src = url;
}

function downloadSVG() {
    const svg = document.getElementById('architecture');
    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    
    const link = document.createElement('a');
    link.download = 'rbc-cte-validation-architecture.svg';
    link.href = url;
    link.click();
    URL.revokeObjectURL(url);
    showStatus('✓ SVG downloaded successfully!');
}
</script>
